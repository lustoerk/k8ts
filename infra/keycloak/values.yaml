image:
  repository: quay.io/keycloak/keycloak
  tag: "26.5.3"

http:
  # Serve at root — our OIDC URLs have no /auth prefix
  relativePath: "/"

# Pass --import-realm so Keycloak imports /opt/keycloak/data/import/ on startup
args:
  - "start"
  - "--import-realm"

extraEnv: |
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin
        key: admin-password
  - name: KC_HOSTNAME_URL
    value: https://keycloak.homelab
  - name: KC_HOSTNAME_STRICT
    value: "false"

database:
  vendor: postgres
  hostname: keycloak-postgresql
  port: 5432
  database: keycloak
  username: keycloak
  existingSecret: keycloak-postgres
  existingSecretKey: password

nodeSelector:
  kubernetes.io/arch: arm64

# Single-node minikube — disable pod anti-affinity
affinity: ""

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  rules:
    - host: keycloak.homelab
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: keycloak-tls
      hosts:
        - keycloak.homelab

# Init container substitutes Vault-backed client secrets into realm JSON template
# before Keycloak starts, keeping secrets out of git and ConfigMaps
extraInitContainers: |
  - name: realm-import-prep
    image: alpine:3
    command:
      - sh
      - -c
      - |
        apk add --no-cache gettext && \
        envsubst '${GRAFANA_CLIENT_SECRET} ${ARGOCD_CLIENT_SECRET}' \
          < /realm-template/homelab.json > /realm-import/homelab.json
    env:
      - name: GRAFANA_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: keycloak-client-secrets
            key: GRAFANA_CLIENT_SECRET
      - name: ARGOCD_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: keycloak-client-secrets
            key: ARGOCD_CLIENT_SECRET
    volumeMounts:
      - name: realm-template
        mountPath: /realm-template
      - name: realm-import
        mountPath: /realm-import

extraVolumes: |
  - name: realm-template
    configMap:
      name: keycloak-realm-config
  - name: realm-import
    emptyDir: {}

extraVolumeMounts: |
  - name: realm-import
    mountPath: /opt/keycloak/data/import
