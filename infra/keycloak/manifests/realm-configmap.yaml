apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: keycloak
data:
  homelab.json: |
    {
      "realm": "homelab",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "clients": [
        {
          "clientId": "grafana",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "$(GRAFANA_CLIENT_SECRET)",
          "redirectUris": ["https://graf.homelab/*"],
          "webOrigins": ["https://graf.homelab"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        },
        {
          "clientId": "argocd",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "$(ARGOCD_CLIENT_SECRET)",
          "redirectUris": ["https://argo.homelab/*"],
          "webOrigins": ["https://argo.homelab"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "claim.name": "groups",
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "groups": [
        { "name": "admin" },
        { "name": "viewer" }
      ]
    }
