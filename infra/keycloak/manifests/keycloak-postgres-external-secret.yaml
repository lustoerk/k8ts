apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-postgres
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-postgres
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: keycloak
        property: postgres-keycloak-password
