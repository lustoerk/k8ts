prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - prom.homelab
    tls:
      - secretName: prometheus-tls
        hosts:
          - prom.homelab
  prometheusSpec:
    retention: 15d
    nodeSelector:
      kubernetes.io/arch: arm64
    resources:
      requests:
        cpu: 100m
        memory: 1200Mi
      limits:
        cpu: 500m
        memory: 2000Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi

grafana:
  resources:
    requests:
      cpu: 50m
      memory: 400Mi
    limits:
      cpu: 200m
      memory: 600Mi
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 128Mi
  admin:
    existingSecret: grafana-admin
    passwordKey: admin-password
  nodeSelector:
    kubernetes.io/arch: arm64
  # ESO-managed secret in monitoring ns; provides GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
  envFromSecret: grafana-oauth
  grafana.ini:
    server:
      root_url: https://graf.homelab
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://keycloak.homelab/realms/homelab/protocol/openid-connect/auth
      token_url: http://keycloak-keycloakx-http.keycloak.svc.cluster.local:80/realms/homelab/protocol/openid-connect/token
      api_url: http://keycloak-keycloakx-http.keycloak.svc.cluster.local:80/realms/homelab/protocol/openid-connect/userinfo
      role_attribute_path: contains(groups[*], 'admin') && 'Admin' || 'Viewer'
      use_pkce: true
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
    hosts:
      - graf.homelab
    tls:
      - secretName: grafana-tls
        hosts:
          - graf.homelab

alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - alman.homelab
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alman.homelab
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/arch: arm64
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
    receivers:
      - name: "null"

nodeExporter:
  enabled: true

prometheus-node-exporter:
  namespaceOverride: monitoring
  resources:
    requests:
      cpu: 10m
      memory: 40Mi
    limits:
      cpu: 100m
      memory: 80Mi

kube-state-metrics:
  namespaceOverride: monitoring
  nodeSelector:
    kubernetes.io/arch: arm64
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 100m
      memory: 200Mi

prometheusOperator:
  nodeSelector:
    kubernetes.io/arch: arm64
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 128Mi
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 128Mi