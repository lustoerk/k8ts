prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - prom.homelab
    tls:
      - secretName: prometheus-tls
        hosts:
          - prom.homelab
  prometheusSpec:
    retention: 15d
    nodeSelector:
      kubernetes.io/arch: arm64
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi

grafana:
  admin:
    existingSecret: grafana-admin
    passwordKey: admin-password
  nodeSelector:
    kubernetes.io/arch: arm64
  # ESO-managed secret in monitoring ns; provides GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
  envFromSecret: grafana-oauth
  grafana.ini:
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://keycloak.homelab/realms/homelab/protocol/openid-connect/auth
      token_url: https://keycloak.homelab/realms/homelab/protocol/openid-connect/token
      api_url: https://keycloak.homelab/realms/homelab/protocol/openid-connect/userinfo
      role_attribute_path: contains(groups[*], 'admin') && 'Admin' || 'Viewer'
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
    hosts:
      - graf.homelab
    tls:
      - secretName: grafana-tls
        hosts:
          - graf.homelab

alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - alman.homelab
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alman.homelab
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/arch: arm64
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
    receivers:
      - name: "null"

nodeExporter:
  enabled: true

kube-state-metrics:
  nodeSelector:
    kubernetes.io/arch: arm64

prometheusOperator:
  nodeSelector:
    kubernetes.io/arch: arm64