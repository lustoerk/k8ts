apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-resources-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-resources.json: |
    {
      "uid": "homelab-resources",
      "title": "Homelab — Resource Usage vs Limits",
      "tags": ["homelab", "resources"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "label": "Namespace",
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "argocd", "value": "argocd" },
              { "text": "cert-manager", "value": "cert-manager" },
              { "text": "external-secrets", "value": "external-secrets" },
              { "text": "ingress-nginx", "value": "ingress-nginx" },
              { "text": "keycloak", "value": "keycloak" },
              { "text": "monitoring", "value": "monitoring" },
              { "text": "seaweedfs", "value": "seaweedfs" },
              { "text": "vault", "value": "vault" }
            ],
            "includeAll": true,
            "multi": false,
            "query": "argocd,cert-manager,external-secrets,ingress-nginx,keycloak,monitoring,seaweedfs,vault"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Memory",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 2,
          "title": "Memory Usage % of Limit — by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 1, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 80 },
                  { "color": "red", "value": 90 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sort_desc(\n  sum by(namespace) (\n    container_memory_working_set_bytes{\n      container!=\"\",\n      namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"\n    }\n  ) /\n  sum by(namespace) (\n    kube_pod_container_resource_limits{\n      resource=\"memory\",\n      namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"\n    }\n  ) * 100\n)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Memory: Used vs Request vs Limit — by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "basic",
            "valueMode": "color",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "min": 0,
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by(namespace) (container_memory_working_set_bytes{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "used · {{namespace}}",
              "refId": "A"
            },
            {
              "expr": "sum by(namespace) (kube_pod_container_resource_requests{resource=\"memory\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "request · {{namespace}}",
              "refId": "B"
            },
            {
              "expr": "sum by(namespace) (kube_pod_container_resource_limits{resource=\"memory\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "limit · {{namespace}}",
              "refId": "C"
            }
          ]
        },
        {
          "id": 4,
          "title": "Memory Detail — per Container",
          "type": "table",
          "gridPos": { "x": 0, "y": 9, "w": 24, "h": 10 },
          "options": {
            "sortBy": [{ "displayName": "Used", "desc": true }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Used" },
                "properties": [{ "id": "unit", "value": "bytes" }, { "id": "custom.width", "value": 110 }]
              },
              {
                "matcher": { "id": "byName", "options": "Request" },
                "properties": [{ "id": "unit", "value": "bytes" }, { "id": "custom.width", "value": 110 }]
              },
              {
                "matcher": { "id": "byName", "options": "Limit" },
                "properties": [{ "id": "unit", "value": "bytes" }, { "id": "custom.width", "value": 110 }]
              },
              {
                "matcher": { "id": "byName", "options": "% of Limit" },
                "properties": [
                  { "id": "unit", "value": "percent" },
                  { "id": "custom.width", "value": 100 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 60 },
                        { "color": "orange", "value": 80 },
                        { "color": "red", "value": 90 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "container": "Container",
                  "Value #A": "Used",
                  "Value #B": "Request",
                  "Value #C": "Limit",
                  "Value #D": "% of Limit"
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "sort_desc(sum by(namespace, pod, container) (container_memory_working_set_bytes{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}))",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by(namespace, pod, container) (kube_pod_container_resource_requests{resource=\"memory\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "",
              "refId": "B",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by(namespace, pod, container) (kube_pod_container_resource_limits{resource=\"memory\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "",
              "refId": "C",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by(namespace, pod, container) (container_memory_working_set_bytes{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}) / sum by(namespace, pod, container) (kube_pod_container_resource_limits{resource=\"memory\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}) * 100",
              "legendFormat": "",
              "refId": "D",
              "instant": true,
              "format": "table"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "CPU",
          "gridPos": { "x": 0, "y": 19, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 5,
          "title": "CPU Usage % of Limit — by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 80 },
                  { "color": "red", "value": 90 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "expr": "sort_desc(\n  sum by(namespace) (\n    rate(container_cpu_usage_seconds_total{\n      container!=\"\",\n      namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"\n    }[5m])\n  ) /\n  sum by(namespace) (\n    kube_pod_container_resource_limits{\n      resource=\"cpu\",\n      namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"\n    }\n  ) * 100\n)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "CPU: Used vs Request vs Limit — by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "displayMode": "basic",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "sum by(namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}[5m]))",
              "legendFormat": "used · {{namespace}}",
              "refId": "A"
            },
            {
              "expr": "sum by(namespace) (kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "request · {{namespace}}",
              "refId": "B"
            },
            {
              "expr": "sum by(namespace) (kube_pod_container_resource_limits{resource=\"cpu\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "limit · {{namespace}}",
              "refId": "C"
            }
          ]
        },
        {
          "id": 7,
          "title": "CPU Detail — per Container",
          "type": "table",
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 10 },
          "options": {
            "sortBy": [{ "displayName": "Used (cores)", "desc": true }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Used (cores)" },
                "properties": [{ "id": "unit", "value": "short" }, { "id": "custom.width", "value": 120 }]
              },
              {
                "matcher": { "id": "byName", "options": "Request (cores)" },
                "properties": [{ "id": "unit", "value": "short" }, { "id": "custom.width", "value": 130 }]
              },
              {
                "matcher": { "id": "byName", "options": "Limit (cores)" },
                "properties": [{ "id": "unit", "value": "short" }, { "id": "custom.width", "value": 120 }]
              },
              {
                "matcher": { "id": "byName", "options": "% of Limit" },
                "properties": [
                  { "id": "unit", "value": "percent" },
                  { "id": "custom.width", "value": 100 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 60 },
                        { "color": "orange", "value": 80 },
                        { "color": "red", "value": 90 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "container": "Container",
                  "Value #A": "Used (cores)",
                  "Value #B": "Request (cores)",
                  "Value #C": "Limit (cores)",
                  "Value #D": "% of Limit"
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "sort_desc(sum by(namespace, pod, container) (rate(container_cpu_usage_seconds_total{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}[5m])))",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by(namespace, pod, container) (kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "",
              "refId": "B",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by(namespace, pod, container) (kube_pod_container_resource_limits{resource=\"cpu\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"})",
              "legendFormat": "",
              "refId": "C",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by(namespace, pod, container) (rate(container_cpu_usage_seconds_total{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}[5m])) / sum by(namespace, pod, container) (kube_pod_container_resource_limits{resource=\"cpu\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}) * 100",
              "legendFormat": "",
              "refId": "D",
              "instant": true,
              "format": "table"
            }
          ]
        },
        {
          "id": 11,
          "type": "row",
          "title": "Trends",
          "gridPos": { "x": 0, "y": 38, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 8,
          "title": "Memory Usage over Time — Top Consumers",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 39, "w": 12, "h": 8 },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 5 }
            }
          },
          "targets": [
            {
              "expr": "sort_desc(sum by(namespace) (container_memory_working_set_bytes{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "CPU Usage over Time — Top Consumers",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 39, "w": 12, "h": 8 },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 5 }
            }
          },
          "targets": [
            {
              "expr": "sort_desc(sum by(namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", namespace=~\"argocd|cert-manager|external-secrets|ingress-nginx|keycloak|monitoring|seaweedfs|vault\"}[5m])))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
