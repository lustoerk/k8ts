global:
  nodeSelector:
    kubernetes.io/arch: arm64

configs:
  params:
    server.insecure: true
  # argocd-cm and argocd-rbac-cm are managed by the argocd-ingress Application
  # (raw manifests in infra/argocd/). Chart must not render them or server-side
  # apply rejects on field-manager conflict with argocd-controller.
  cm:
    create: false
  rbac:
    create: false

server:
  service:
    type: NodePort
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 200Mi

controller:
  resources:
    requests:
      cpu: 50m
      memory: 400Mi
    limits:
      cpu: 200m
      memory: 800Mi

repoServer:
  resources:
    requests:
      cpu: 20m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 300Mi

applicationSet:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 128Mi

dex:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 128Mi

notifications:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi
