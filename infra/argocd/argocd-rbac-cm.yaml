apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # Unauthenticated / unmatched users get read-only
  policy.default: role:readonly
  # Keycloak group 'admin' -> ArgoCD admin role
  policy.csv: |
    g, admin, role:admin
  # Tell ArgoCD which token claim carries group membership
  scopes: '[groups]'
