apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://github.com/lustoerk/k8ts.git
      targetRevision: main
      ref: values
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: "0.32.x"
      helm:
        valueFiles:
          - $values/infra/vault/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
