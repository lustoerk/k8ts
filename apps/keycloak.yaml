apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://github.com/lustoerk/k8ts.git
      targetRevision: main
      ref: values
    - repoURL: https://charts.bitnami.com/bitnami
      chart: keycloak
      targetRevision: "25.2.0"
      helm:
        valueFiles:
          - $values/infra/keycloak/values.yaml
    - repoURL: https://github.com/lustoerk/k8ts.git
      targetRevision: main
      path: infra/keycloak/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
